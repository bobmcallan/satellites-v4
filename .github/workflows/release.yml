name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: satellites

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build ./cmd/satellites/
          go build ./cmd/satellites-agent/

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... -timeout 120s

      - name: Integration tests
        run: go test ./tests/integration/... -timeout 600s

  push:
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(awk '/^\[satellites\]/{f=1;next} /^\[/{f=0} f && /^version/{gsub(/version\s*=\s*/,""); gsub(/ /,""); print; exit}' .version)
          {
            echo "version=${VERSION}"
            echo "build=$(date -u +%Y%m%d%H%M%S)"
            echo "commit=${GITHUB_SHA::8}"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD=${{ steps.meta.outputs.build }}
            GIT_COMMIT=${{ steps.meta.outputs.commit }}
          provenance: false
          sbom: false

      - name: Push image
        env:
          TAGS: ${{ steps.docker-meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "::group::Pushing $tag"
            docker push "$tag"
            echo "::endgroup::"
          done <<< "$TAGS"
